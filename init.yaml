apiVersion: v1
kind: Pod
metadata:
  name: kerrors-init-demo
  labels:
    app: kerrors-init-demo
spec:
  restartPolicy: Always
  initContainers:
    - name: init-ok-a
      image: busybox:1.36
      imagePullPolicy: IfNotPresent
      command:
        - sh
        - -c
        - echo "init-ok-a completed"
    - name: init-ok-b
      image: busybox:1.36
      imagePullPolicy: IfNotPresent
      command:
        - sh
        - -c
        - echo "init-ok-b completed"
    - name: init-crash-exit
      image: busybox:1.36
      imagePullPolicy: IfNotPresent
      command:
        - sh
        - -c
        - |
          if [ ! -f /state/init-crash-exit.failed ]; then
            touch /state/init-crash-exit.failed
            echo "init-crash-exit fails intentionally once"
            exit 1
          fi
          echo "init-crash-exit recovered after one intentional failure"
      volumeMounts:
        - name: init-state
          mountPath: /state
    - name: init-crash-command
      image: busybox:1.36
      imagePullPolicy: IfNotPresent
      command:
        - sh
        - -c
        - echo "init-crash-command fails intentionally"; /missing-init-command
  containers:
    - name: app
      image: busybox:1.36
      imagePullPolicy: IfNotPresent
      command:
        - sh
        - -c
        - while true; do echo "app would run after init containers"; sleep 300; done
  volumes:
    - name: init-state
      emptyDir: {}
